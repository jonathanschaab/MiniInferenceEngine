<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Inference Engine</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #11111b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; }
        header h1 { margin: 0; font-size: 1.4rem; color: #cdd6f4; }
        button, select { 
            font-family: inherit; 
            font-size: 0.9rem; 
        }
        
        button { 
            border-radius: 6px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            color: #11111b; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
        }
        
        button:hover { 
            filter: brightness(1.15); 
        }
        .status { color: #a6e3a1; font-size: 0.9rem; font-weight: normal; margin-top: 4px; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .user-message { background: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-message { background: #313244; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 0; font-family: 'Courier New', Courier, monospace; }
        
        /* Align items to the bottom so the button stays anchored when the textarea grows */
        #input-container { padding: 20px; background: #181825; display: flex; gap: 10px; border-top: 1px solid #313244; align-items: flex-end; }
        
        /* Upgraded to Textarea */
        textarea { 
            flex: 1; 
            padding: 14px; 
            border-radius: 6px; 
            border: 1px solid #45475a; 
            background: #1e1e2e; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            font-family: inherit;
            resize: none; /* Prevent manual dragging */
            min-height: 22px;
            max-height: 200px; /* Force scrolling if the prompt is massive */
            overflow-y: auto;
            line-height: 1.4;
        }
        textarea:focus { border-color: #89b4fa; }
        
        #send-btn { 
            padding: 14px 24px; 
            border-radius: 6px; 
            border: none; 
            background: #89b4fa; 
            color: #11111b; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 16px; 
            height: 52px; 
        }
        #send-btn:hover { background: #b4befe; }
        #send-btn:disabled { background: #45475a; color: #a6adc8; cursor: not-allowed; }
        .typing { font-style: italic; color: #a6adc8; font-size: 0.9rem; align-self: flex-start; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Mini Inference Engine</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <select id="chat-model-select" style="background: #313244; color: white; border: none; padding: 5px; border-radius: 4px;"></select>
            <select id="compressor-model-select" style="background: #313244; color: white; border: none; padding: 5px; border-radius: 4px;"></select>
            
            <button onclick="clearChat()" style="background: #f38ba8; height: 30px; padding: 0 10px;">🗑️ Clear Chat</button>
            <button onclick="window.location.href='/stats'" style="background: #cba6f7; height: 30px; padding: 0 10px;">📊 Stats</button>
            <button onclick="window.location.href='/settings'" style="background: #a6e3a1; height: 30px; padding: 0 10px;">⚙️ Settings</button>
            <button onclick="window.location.href='/auth/logout'" style="background: #45475a; color: white; height: 30px; padding: 0 10px;">Logout</button>
        </div>
    </header>
    
    <div id="chat-container">
        <div class="message ai-message">System: Engine ready. TinyLlama 1.1B online. How can I help you?</div>
    </div>
    <div id="typing-indicator" class="typing" style="padding: 0 20px;">TinyLlama is thinking...</div>
    
    <div id="input-container">
        <textarea id="prompt-input" placeholder="Message the AI... (Shift + Enter for new line)" rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>

<script>
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        let chatHistory = [];

        window.onload = initializeUI;

        async function initializeUI() {
            try {
                const results = await Promise.allSettled([
                    fetch('/api/status').then(res => res.json()),
                    fetch('/api/models').then(res => res.json())
                ]);

                const statusResult = results[0];
                const modelsResult = results[1];

                let models = [];
                if (modelsResult.status === 'fulfilled') {
                    models = modelsResult.value;
                } else {
                    console.error("Critical: Failed to fetch models.", modelsResult.reason);
                    appendMessage("System Error: Could not connect to the model registry.", false);
                    return; 
                }

                let status = {};
                if (statusResult.status === 'fulfilled') {
                    status = statusResult.value;
                } else {
                    console.warn("Engine status unavailable. Falling back to defaults.");
                }

                const chatSelect = document.getElementById('chat-model-select');
                const compSelect = document.getElementById('compressor-model-select');

                chatSelect.innerHTML = '';
                compSelect.innerHTML = '';

                models.forEach(m => {
                    if (m.roles.includes("GeneralChat") || m.roles.includes("CodeSpecialist")) {
                        chatSelect.add(new Option(`Chat: ${m.name}`, m.id));
                    }
                    if (m.roles.includes("ContextCompressor")) {
                        compSelect.add(new Option(`Compressor: ${m.name}`, m.id));
                    }
                });

                if (status.active_chat_model_id) {
                    chatSelect.value = status.active_chat_model_id;
                }
                if (status.last_compressor_model_id) {
                    compSelect.value = status.last_compressor_model_id;
                }
            } catch (err) {
                console.error("Failed to execute UI initialization:", err);
            }
        }

        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function clearChat() {
            chatHistory = [];
            // Remove all messages except the first AI greeting
            const messages = chatContainer.querySelectorAll('.message');
            for (let i = 1; i < messages.length; i++) {
                chatContainer.removeChild(messages[i]);
            }
        }

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, true);
            chatHistory.push({ role: "user", content: text });
            
            inputField.value = '';
            inputField.style.height = 'auto'; 
            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';

            try {
                // Grab the IDs from the UI dropdowns
                const chatModelId = document.getElementById('chat-model-select').value;
                const compModelId = document.getElementById('compressor-model-select').value;

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_model_id: chatModelId,
                        compressor_model_id: compModelId,
                        messages: chatHistory 
                    })
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                appendMessage(data.answer, false);
                chatHistory.push({ role: "assistant", content: data.answer });

            } catch (err) {
                typingIndicator.style.display = 'none';
                appendMessage("Error: Failed to connect to engine.", false);
                chatHistory.pop(); 
            }
            sendBtn.disabled = false;
            inputField.focus();
        }

        sendBtn.addEventListener('click', sendMessage);

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
