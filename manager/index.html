<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Inference Engine</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #11111b; padding: 15px 20px; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #313244; display: flex; justify-content: space-between;}
        .status { color: #a6e3a1; font-size: 0.9rem; font-weight: normal; margin-top: 4px; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .user-message { background: #89b4fa; color: #11111b; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-message { background: #313244; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 0; font-family: 'Courier New', Courier, monospace; }
        
        /* Align items to the bottom so the button stays anchored when the textarea grows */
        #input-container { padding: 20px; background: #181825; display: flex; gap: 10px; border-top: 1px solid #313244; align-items: flex-end; }
        
        /* Upgraded to Textarea */
        textarea { 
            flex: 1; 
            padding: 14px; 
            border-radius: 6px; 
            border: 1px solid #45475a; 
            background: #1e1e2e; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            font-family: inherit;
            resize: none; /* Prevent manual dragging */
            min-height: 22px;
            max-height: 200px; /* Force scrolling if the prompt is massive */
            overflow-y: auto;
            line-height: 1.4;
        }
        textarea:focus { border-color: #89b4fa; }
        
        button { padding: 14px 24px; border-radius: 6px; border: none; background: #89b4fa; color: #11111b; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; height: 52px; }
        button:hover { background: #b4befe; }
        button:disabled { background: #45475a; color: #a6adc8; cursor: not-allowed; }
        .typing { font-style: italic; color: #a6adc8; font-size: 0.9rem; align-self: flex-start; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div>Mini Inference Engine</div>
        <div class="status">🟢 VRAM Loaded</div>
    </header>
    
    <div id="chat-container">
        <div class="message ai-message">System: Engine ready. TinyLlama 1.1B online. How can I help you?</div>
    </div>
    <div id="typing-indicator" class="typing" style="padding: 0 20px;">TinyLlama is thinking...</div>
    
    <div id="input-container">
        <textarea id="prompt-input" placeholder="Message the AI... (Shift + Enter for new line)" rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>

<script>
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // STATE: We hold the entire conversation memory in the browser
        let chatHistory = [
            { role: "system", content: "You are a helpful and concise AI assistant." }
        ];

        inputField.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // 1. Add user message to UI and History State
            appendMessage(text, true);
            chatHistory.push({ role: "user", content: text });
            
            inputField.value = '';
            inputField.style.height = 'auto'; 
            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory }) // Send the whole array
                });
                
                const data = await response.json();
                typingIndicator.style.display = 'none';
                
                // 2. Add AI response to UI and History State
                appendMessage(data.answer, false);
                chatHistory.push({ role: "assistant", content: data.answer });

            } catch (err) {
                typingIndicator.style.display = 'none';
                appendMessage("Error: Failed to connect to engine.", false);
                // If it fails, pop the user message off so they can try again
                chatHistory.pop(); 
            }
            sendBtn.disabled = false;
            inputField.focus();
        }

        sendBtn.addEventListener('click', sendMessage);

        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
