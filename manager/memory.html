<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRAM Tracker</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; }
        header { background: #11111b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; }
        header h1 { margin: 0; font-size: 1.4rem; color: #cdd6f4; }
        button { font-family: inherit; font-size: 0.9rem; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; color: #11111b; display: inline-flex; align-items: center; justify-content: center; }
        button:hover { filter: brightness(1.15); }
        
        .tab-container { display: flex; border-bottom: 1px solid #313244; }
        .tab { padding: 10px 20px; cursor: pointer; color: #a6adc8; font-weight: bold; }
        .tab.active { color: #89b4fa; border-bottom: 2px solid #89b4fa; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .vram-bar-container { width: 100%; height: 40px; background: #313244; border-radius: 8px; display: flex; overflow: hidden; margin-top: 20px; border: 2px solid #45475a;}
        .vram-weights { background: #89b4fa; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #11111b; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        .vram-kv { background: #a6e3a1; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #11111b; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        .vram-compute { background: #f9e2af; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #11111b; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        .vram-other { background: #f38ba8; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #11111b; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        .vram-free { background: #181825; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #a6adc8; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}

        .ram-bar-container { width: 100%; height: 40px; background: #313244; border-radius: 8px; display: flex; overflow: hidden; margin-top: 20px; border: 2px solid #45475a;}
        .ram-process { background: #a6e3a1; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #11111b; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        .ram-other { background: #f38ba8; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #11111b; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        .ram-free { background: #181825; height: 100%; transition: width 0.5s ease-out; display: flex; align-items: center; justify-content: center; color: #a6adc8; font-weight: bold; font-size: 0.85rem; overflow: hidden; white-space: nowrap;}
        
        .legend { display: flex; gap: 20px; margin-top: 10px; font-size: 0.9rem;}
        .legend-item { display: flex; align-items: center; gap: 8px; color: #a6adc8;}
        .legend-color { width: 15px; height: 15px; border-radius: 3px; }

        .model-cards { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .model-card { background: #313244; padding: 20px; border-radius: 8px; min-width: 300px; border-left: 5px solid #89b4fa; }
        .model-card h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: #89b4fa; }
        .model-stat { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .status-active { color: #a6e3a1; font-weight: bold; }
        .status-idle { color: #6c7086; font-style: italic; }

        table { width: 100%; border-collapse: collapse; margin-top: 40px; background: #181825; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #313244; font-family: monospace;}
        th { background: #11111b; font-weight: bold; color: #89b4fa; text-transform: uppercase; font-size: 0.85rem; }

        .log-allocate { color: #f38ba8; }
        .log-free { color: #a6e3a1; }
        .log-measure { color: #89b4fa; }
        .log-fail { color: #f38ba8; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Live VRAM Dashboard</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button onclick="window.location.href='/'" style="background: #89b4fa; height: 30px; padding: 0 10px;">💬 Chat</button>
            <button onclick="window.location.href='/stats'" style="background: #cba6f7; height: 30px; padding: 0 10px;">📊 Stats</button>
            <button onclick="window.location.href='/settings'" style="background: #a6e3a1; height: 30px; padding: 0 10px;">⚙️ Settings</button>
        </div>
    </header>

    <div class="tab-container">
        <div class="tab active" onclick="switchTab('vram')">GPU VRAM</div>
        <div class="tab" onclick="switchTab('ram')">System RAM</div>
    </div>

    <div id="vram-view" class="tab-content active">
        <div class="container">
            <h2>Physical VRAM Allocation</h2>
            <div class="vram-bar-container">
                <div id="bar-weights" class="vram-weights"></div>
                <div id="bar-kv" class="vram-kv"></div>
                <div id="bar-compute" class="vram-compute"></div>
                <div id="bar-other" class="vram-other"></div>
                <div id="bar-free" class="vram-free"></div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background: #89b4fa;"></div><span id="txt-weights">Weights</span></div>
                <div class="legend-item"><div class="legend-color" style="background: #a6e3a1;"></div><span id="txt-kv">KV Cache</span></div>
                <div class="legend-item"><div class="legend-color" style="background: #f9e2af;"></div><span id="txt-compute">Compute Margin</span></div>
                <div class="legend-item"><div class="legend-color" style="background: #f38ba8;"></div><span id="txt-other">Other Processes</span></div>
                <div class="legend-item"><div class="legend-color" style="background: #181825; border: 1px solid #45475a;"></div><span id="txt-free">Free VRAM</span></div>
            </div>

            <div id="loaded-models-container" class="model-cards"></div>

            <table style="margin-top: 50px;">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Subsystem</th>
                        <th>Description</th>
                        <th>Size (MB)</th>
                    </tr>
                </thead>
                <tbody id="vram-log-body"></tbody>
            </table>
        </div>
    </div>

    <div id="ram-view" class="tab-content">
        <div class="container">
            <h2>System RAM Allocation</h2>
            <div class="ram-bar-container">
                <div id="bar-ram-process" class="ram-process"></div>
                <div id="bar-ram-other" class="ram-other"></div>
                <div id="bar-ram-free" class="ram-free"></div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background: #a6e3a1;"></div><span id="txt-ram-process">Engine Process</span></div>
                <div class="legend-item"><div class="legend-color" style="background: #f38ba8;"></div><span id="txt-ram-other">OS / Other Processes</span></div>
                <div class="legend-item"><div class="legend-color" style="background: #181825; border: 1px solid #45475a;"></div><span id="txt-ram-free">Free RAM</span></div>
            </div>

            <table style="margin-top: 50px;">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Subsystem</th>
                        <th>Description</th>
                        <th>Size (MB)</th>
                    </tr>
                </thead>
                <tbody id="ram-log-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        function formatMB(bytes) {
            if (bytes === 0) return "-";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }
        function formatGB(bytes) {
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        }
        function formatTime(millis) {
            const d = new Date(millis);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            const activeTab = document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`);
            const activeContent = document.getElementById(`${tabName}-view`);
            if (activeTab) activeTab.classList.add('active');
            if (activeContent) activeContent.classList.add('active');
        }

        async function updateDashboard() {
            const res = await fetch('/api/status');
            if (!res.ok) {
                if (res.status === 401) window.location.href = '/auth/login';
                return;
            }
            const status = await res.json();
            
            // VRAM Update
            if (status.vram_total > 0) {
                let totalWeights = 0, totalKv = 0, totalCompute = 0;
                
                const modelsContainer = document.getElementById('loaded-models-container');
                modelsContainer.innerHTML = '';

                status.models_vram.forEach(m => {
                    totalWeights += m.weights;
                    totalKv += m.kv_cache;
                    totalCompute += m.compute;

                    const statusClass = m.status === 'Active' ? 'status-active' : 'status-idle';
                    modelsContainer.innerHTML += `
                        <div class="model-card">
                            <h3>${m.id} <span style="color:#a6adc8; font-size:0.8rem;">(${m.backend})</span></h3>
                            <div class="model-stat"><span>Weights:</span> <span style="color:#89b4fa; font-weight:bold;">${formatMB(m.weights)}</span></div>
                            <div class="model-stat"><span>KV Cache Context:</span> <span style="color:#a6e3a1; font-weight:bold;">${formatMB(m.kv_cache)}</span></div>
                            <div class="model-stat"><span>Compute Buffer:</span> <span style="color:#f9e2af; font-weight:bold;">${formatMB(m.compute)}</span></div>
                            <div class="model-stat"><span>Status:</span> <span class="${statusClass}">${m.status}</span></div>
                            <div class="model-stat" style="margin-top:10px; border-top:1px solid #45475a; padding-top:8px;"><span>Total Impact:</span> <span style="color:#cdd6f4; font-weight:bold;">${formatMB(m.weights + m.kv_cache + m.compute)}</span></div>
                        </div>
                    `;
                });

                const otherPct = (status.vram_other_processes / status.vram_total) * 100;
                const freePct = (status.vram_free / status.vram_total) * 100;

                document.getElementById('bar-weights').style.width = `${(totalWeights / status.vram_total) * 100}%`;
                document.getElementById('bar-kv').style.width = `${(totalKv / status.vram_total) * 100}%`;
                document.getElementById('bar-compute').style.width = `${(totalCompute / status.vram_total) * 100}%`;
                document.getElementById('bar-other').style.width = `${otherPct}%`;
                document.getElementById('bar-free').style.width = `${freePct}%`;

                document.getElementById('txt-weights').innerText = `Weights: ${formatGB(totalWeights)}`;
                document.getElementById('txt-kv').innerText = `KV Cache: ${formatGB(totalKv)}`;
                document.getElementById('txt-compute').innerText = `Compute: ${formatGB(totalCompute)}`;
                document.getElementById('txt-other').innerText = `OS/Other: ${formatGB(status.vram_other_processes)}`;
                document.getElementById('txt-free').innerText = `Free: ${formatGB(status.vram_free)}`;
            }

            const vramTbody = document.getElementById('vram-log-body');
            vramTbody.innerHTML = '';
            
            status.vram_events.slice().reverse().forEach(ev => { // Newest on top
                let colorClass = ev.action === "Allocate" ? "log-allocate" : (ev.action === "Free" ? "log-free" : (ev.action === "Fail" ? "log-fail" : "log-measure"));
                vramTbody.innerHTML += `
                    <tr>
                        <td style="color: #6c7086;">${formatTime(ev.timestamp)}</td>
                        <td class="${colorClass}">${ev.action}</td>
                        <td style="color: #cba6f7;">${ev.subsystem}</td>
                        <td>${ev.description}</td>
                        <td>${formatMB(ev.bytes)}</td>
                    </tr>`;
            });

            // RAM Update
            if (status.ram_total > 0) {
                const processPct = (status.ram_process_used / status.ram_total) * 100;
                const otherPct = (status.ram_other_processes / status.ram_total) * 100;
                const freePct = (status.ram_free / status.ram_total) * 100;

                document.getElementById('bar-ram-process').style.width = `${processPct}%`;
                document.getElementById('bar-ram-other').style.width = `${otherPct}%`;
                document.getElementById('bar-ram-free').style.width = `${freePct}%`;

                document.getElementById('txt-ram-process').innerText = `Engine Process: ${formatGB(status.ram_process_used)}`;
                document.getElementById('txt-ram-other').innerText = `OS/Other: ${formatGB(status.ram_other_processes)}`;
                document.getElementById('txt-ram-free').innerText = `Free: ${formatGB(status.ram_free)}`;
            }

            const ramTbody = document.getElementById('ram-log-body');
            ramTbody.innerHTML = '';
            status.ram_events.slice().reverse().forEach(ev => { // Newest on top
                let colorClass = ev.action === "Allocate" ? "log-allocate" : (ev.action === "Free" ? "log-free" : (ev.action === "Fail" ? "log-fail" : "log-measure"));
                ramTbody.innerHTML += `
                    <tr>
                        <td style="color: #6c7086;">${formatTime(ev.timestamp)}</td>
                        <td class="${colorClass}">${ev.action}</td>
                        <td style="color: #cba6f7;">${ev.subsystem}</td>
                        <td>${ev.description}</td>
                        <td>${formatMB(ev.bytes)}</td>
                    </tr>`;
            });
        }
        setInterval(updateDashboard, 1000);
        window.onload = updateDashboard;
    </script>
</body>
</html>
