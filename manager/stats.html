<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; padding-bottom: 20px; margin-bottom: 20px; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background: #89b4fa; color: #11111b; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #b4befe; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 40px; background: #181825; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #313244; }
        th { background: #11111b; font-weight: bold; color: #89b4fa; }
        .chart-container { background: #181825; padding: 20px; border-radius: 8px; margin-bottom: 30px; height: 400px; }
    </style>
</head>
<body>
    <header>
        <h1>Model Telemetry & Benchmarks</h1>
        <div>
            <button onclick="window.location.href='/'" style="background: #45475a; color: white; margin-right: 10px;">Back to Chat</button>
            <button onclick="triggerCollection()">▶ Run Benchmark Suite</button>
        </div>
    </header>

    <table>
        <thead>
            <tr>
                <th>Model Name</th>
                <th>Parameters</th>
                <th>Size on Disk</th>
                <th>Max Context</th>
                <th>Avg Load Time (VRAM)</th>
            </tr>
        </thead>
        <tbody id="model-table-body"></tbody>
    </table>

    <div class="chart-container">
        <canvas id="speedChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="tokenChart"></canvas>
    </div>

    <script>
        const colorPalette = ['#89b4fa', '#f38ba8', '#a6e3a1', '#f9e2af', '#cba6f7', '#94e2d5'];

        async function triggerCollection() {
            if(confirm("This will lock the GPU for several minutes. Continue?")) {
                await fetch('/api/stats/collect', { method: 'POST' });
                alert("Benchmark suite started in the background. Refresh this page in a few minutes to see updated graphs.");
            }
        }

        async function loadDashboard() {
            const [modelsRes, statsRes] = await Promise.all([
                fetch('/api/models'),
                fetch('/api/stats/data')
            ]);
            
            const models = await modelsRes.json();
            const stats = await statsRes.json();
            
            populateTable(models, stats.loads);
            renderSpeedChart(models, stats.generations);
            renderTokenChart(models, stats.generations);
        }

        function populateTable(models, loads) {
            const tbody = document.getElementById('model-table-body');
            
            // Calculate average load times
            const loadAverages = {};
            loads.forEach(l => {
                if (!loadAverages[l.model_id]) loadAverages[l.model_id] = { sum: 0, count: 0 };
                loadAverages[l.model_id].sum += l.load_time_ms;
                loadAverages[l.model_id].count++;
            });

            models.forEach(m => {
                const avgLoad = loadAverages[m.id] ? Math.round(loadAverages[m.id].sum / loadAverages[m.id].count) + " ms" : "No Data";
                tbody.innerHTML += `
                    <tr>
                        <td>${m.name}</td>
                        <td>${m.parameters_billions}B</td>
                        <td>${m.size_on_disk_gb} GB</td>
                        <td>${m.max_context_len.toLocaleString()}</td>
                        <td>${avgLoad}</td>
                    </tr>
                `;
            });
        }

        function renderSpeedChart(models, generations) {
            const datasets = models.map((m, i) => {
                const modelData = generations.filter(g => g.model_id === m.id);
                // Group by prompt size to calculate averages
                const grouped = {};
                modelData.forEach(g => {
                    const bucket = g.prompt_tokens;
                    if (!grouped[bucket]) grouped[bucket] = { sum: 0, count: 0 };
                    grouped[bucket].sum += g.generation_time_ms;
                    grouped[bucket].count++;
                });

                const dataPoints = Object.keys(grouped).map(tokens => ({
                    x: parseInt(tokens),
                    y: grouped[tokens].sum / grouped[tokens].count
                })).sort((a, b) => a.x - b.x);

                return {
                    label: m.name,
                    data: dataPoints,
                    borderColor: colorPalette[i % colorPalette.length],
                    backgroundColor: colorPalette[i % colorPalette.length],
                    tension: 0.3,
                    showLine: true
                };
            }).filter(d => d.data.length > 0);

            new Chart(document.getElementById('speedChart'), {
                type: 'scatter',
                data: { datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { title: { display: true, text: 'Average Generation Time vs. Prompt Tokens', color: '#cdd6f4' }, legend: { labels: { color: '#cdd6f4' } } },
                    scales: {
                        x: { type: 'logarithmic', title: { display: true, text: 'Prompt Size (Tokens) - Log Scale', color: '#cdd6f4' }, grid: { color: '#313244' }, ticks: { color: '#a6adc8' } },
                        y: { title: { display: true, text: 'Generation Time (ms)', color: '#cdd6f4' }, grid: { color: '#313244' }, ticks: { color: '#a6adc8' } }
                    }
                }
            });
        }

        function renderTokenChart(models, generations) {
            const datasets = models.map((m, i) => {
                const modelData = generations.filter(g => g.model_id === m.id);
                // Compare Raw Characters to Parsed Tokens
                const dataPoints = modelData.map(g => ({
                    x: g.prompt_chars,
                    y: g.prompt_tokens
                })).sort((a, b) => a.x - b.x);

                return {
                    label: m.name,
                    data: dataPoints,
                    borderColor: colorPalette[i % colorPalette.length],
                    backgroundColor: colorPalette[i % colorPalette.length],
                    tension: 0.3,
                    showLine: true
                };
            }).filter(d => d.data.length > 0);

            new Chart(document.getElementById('tokenChart'), {
                type: 'scatter',
                data: { datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { title: { display: true, text: 'Tokenizer Efficiency (Tokens vs. Raw Characters)', color: '#cdd6f4' }, legend: { labels: { color: '#cdd6f4' } } },
                    scales: {
                        x: { type: 'logarithmic', title: { display: true, text: 'File Size (Raw Characters) - Log Scale', color: '#cdd6f4' }, grid: { color: '#313244' }, ticks: { color: '#a6adc8' } },
                        y: { type: 'logarithmic', title: { display: true, text: 'Required Tokens', color: '#cdd6f4' }, grid: { color: '#313244' }, ticks: { color: '#a6adc8' } }
                    }
                }
            });
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
