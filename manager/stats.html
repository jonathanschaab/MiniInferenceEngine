<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .chart-container { background: #181825; padding: 20px; border-radius: 8px; margin-bottom: 30px; height: 400px; }
        .model-list { max-height: 300px; overflow-y: auto; margin-bottom: 20px; background: #11111b; padding: 10px; border-radius: 4px; }
        .model-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.95em; }
        .model-item input { margin-right: 10px; transform: scale(1.2); }
    </style>
</head>
<body>
    <header>
        <h1>Engine Telemetry Dashboard</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button onclick="window.location.href='/'" style="background: #89b4fa; height: 30px; padding: 0 10px;">💬 Chat</button>
            <button onclick="window.location.href='/models'" style="background: #fab387; height: 30px; padding: 0 10px;">🤖 Models</button>
            <button onclick="window.location.href='/memory'" style="background: #f9e2af; height: 30px; padding: 0 10px;">💾 Memory</button>
            <button onclick="window.location.href='/console'" style="background: #89dceb; height: 30px; padding: 0 10px;">🖥️ Console</button>
            <button onclick="window.location.href='/settings'" style="background: #a6e3a1; height: 30px; padding: 0 10px;">⚙️ Settings</button>
            <button onclick="window.location.href='/auth/logout'" style="background: #45475a; color: white; height: 30px; padding: 0 10px;">Logout</button>
        </div>
    </header>

    <!-- Session Control Bar -->
    <div style="background: #181825; padding: 10px 20px; border-bottom: 1px solid #313244; display: flex; gap: 15px; align-items: center; justify-content: space-between;">
        <div style="display: flex; gap: 15px; align-items: center;">
            <button id="btn-run-benchmark" onclick="openBenchmarkModal()" style="background: #89b4fa; height: 30px; padding: 0 10px;">▶ Run Benchmark</button>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button onclick="document.getElementById('parameters-panel').style.display = document.getElementById('parameters-panel').style.display === 'none' ? 'flex' : 'none'" style="background: #89dceb; height: 30px; padding: 0 10px;">🎛️ Parameters</button>
        </div>
    </div>

    <div id="parameters-panel" style="display: none; background: #181825; padding: 15px 20px; border-bottom: 1px solid #313244; gap: 20px; flex-wrap: wrap; align-items: center; font-size: 0.9rem;">
        <div class="param-group">
            <label for="param-temp">Temperature: <span id="val-temp">0.7</span></label>
            <input type="range" id="param-temp" min="0" max="2" step="0.1" value="0.7" oninput="document.getElementById('val-temp').innerText=this.value">
        </div>
        <div class="param-group">
            <label for="param-top-p">Top-P: <span id="val-top-p">0.95</span></label>
            <input type="range" id="param-top-p" min="0" max="1" step="0.05" value="0.95" oninput="document.getElementById('val-top-p').innerText=this.value">
        </div>
        <div class="param-group">
            <label for="param-top-k">Top-K:</label>
            <input type="number" id="param-top-k" min="1" max="100" value="40" style="width: 60px;">
        </div>
        <div class="param-group">
            <label for="param-max-tokens">Max Tokens:</label>
            <input type="number" id="param-max-tokens" min="1" max="8192" value="500" style="width: 80px;">
        </div>
        <div class="param-group">
            <label for="param-seed">Seed (Optional):</label>
            <input type="number" id="param-seed" placeholder="Random" style="width: 100px;">
        </div>
        <div class="param-group">
            <label for="param-context-buffer">Ctx Buffer:</label>
            <input type="number" id="param-context-buffer" min="0" max="128000" value="1024" style="width: 80px;">
        </div>
        <div class="param-group">
            <label for="param-yarn-enabled">YaRN Extension:</label>
            <input type="checkbox" id="param-yarn-enabled" checked style="width: 20px; height: 20px; cursor: pointer;">
        </div>
    </div>

    <div style="padding: 20px;">

        <div id="benchmark-banner" style="display: none; background: #f38ba8; color: #11111b; padding: 12px; text-align: center; border-radius: 8px; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
            ⚠️ An automated benchmark suite is currently running. The GPU is heavily utilized and chat responses will be delayed.
        </div>

        <table>
            <thead>
                <tr>
                    <th>Model Name</th>
                    <th>Parameters</th>
                    <th>Size on Disk</th>
                    <th>Max Context</th>
                </tr>
            </thead>
            <tbody id="model-table-body"></tbody>
        </table>

        <div class="chart-container">
            <canvas id="speedChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="tokenChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="tokTimeChart"></canvas>
        </div>

        <div id="benchmark-modal" class="modal-overlay">
            <div class="modal-content">
                <h2>Select Backends</h2>
                <div id="backend-checkbox-list" class="model-list">
                </div>
                <h2>Select Models to Benchmark</h2>
                <div id="model-checkbox-list" class="model-list" style="margin-bottom: 20px;">
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button class="btn-run" onclick="submitBenchmark()">Run Selected</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/stats.js"></script>
</body>
</html>
