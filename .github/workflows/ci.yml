name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang libclang-dev
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.18
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run Clippy
        working-directory: manager
        env:
          CUDA_COMPUTE_CAP: "86" # Bypasses nvidia-smi auto-detection since runners lack GPUs
        run: cargo clippy --all-targets --all-features --target x86_64-unknown-linux-gnu -- -D warnings
      - name: Prepare CUDA Stubs for Linux Runner
        run: sudo ln -s /usr/local/cuda/lib64/stubs/libcuda.so /usr/local/cuda/lib64/stubs/libcuda.so.1 || true
      - name: Run CPU Unit Tests (Suite 1)
        working-directory: manager
        env:
          CUDA_COMPUTE_CAP: "86"
          LD_LIBRARY_PATH: /usr/local/cuda/lib64/stubs:${{ env.LD_LIBRARY_PATH }}
        run: cargo test --all-features --target x86_64-unknown-linux-gnu
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install NPM Dependencies
        working-directory: manager
        run: npm install
      - name: Run Javascript Linter (ESLint)
        working-directory: manager
        run: npm run lint:js
      - name: Install Playwright Browsers
        working-directory: manager
        run: npx playwright install --with-deps chromium
      - name: Run UI Tests (Playwright)
        working-directory: manager
        run: npx playwright test